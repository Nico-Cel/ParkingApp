id: T016
title: Booking lifecycle API
epic: E5-booking-payments
objective: Implement booking creation, confirmation, cancellation state machine.
owner_agent: backend-api
estimate_hours: 2
depends_on:
  - T014
  - T013
  - T011
inputs:
  - services/api/src/modules/bookings
  - packages/db/migrations
outputs:
  - packages/db/migrations/004_bookings.sql
  - services/api/src/modules/bookings/service.ts
  - services/api/src/modules/bookings/routes.ts
  - services/api/src/modules/bookings/bookings.spec.ts
commands_to_run:
  - pnpm --filter db migrate
  - pnpm --filter api build
tests_to_run:
  - pnpm --filter api test -- bookings
  - pnpm --filter api test -- state-machine
verification:
  unit:
    - pnpm --filter api test -- bookings
  integration:
    - pnpm --filter api test -- state-machine
  e2e:
    - pnpm test:e2e -- --grep smoke || true
  manual:
    - Validate acceptance behavior for T016 in running app/API.
  checklist:
    - Required outputs exist at listed file paths.
    - commands_to_run executed without blocking errors.
    - tests_to_run executed and results captured.
done_when:
  - Booking transitions enforce valid state graph.
  - Overlapping bookings cannot be confirmed.
